<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroVerde</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌱 AgroVerde</h1>
    <p>Agro forte, futuro sustentável</p>
</header>

<main>

<section class="card">
    <h2>Calculadora de Sustentabilidade</h2>

    <label>Área da propriedade (ha)</label>
    <input type="number" id="area">

    <label>Área preservada (ha)</label>
    <input type="number" id="preservada">

    <label>Consumo de água (m³/mês)</label>
    <input type="number" id="agua">

    <label>Utiliza energia renovável?</label>
    <select id="energia">
        <option value="nao">Não</option>
        <option value="sim">Sim</option>
    </select>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
</section>

<section class="card">
    <h2>Quiz Sustentável</h2>

    <p>Qual prática ajuda a preservar o solo?</p>

    <button onclick="quiz('errado')">Queimada</button>
    <button onclick="quiz('certo')">Rotação de culturas</button>
    <button onclick="quiz('errado')">Desmatamento</button>

    <h3 id="quizResultado"></h3>
</section>

</main>

<footer>
    Desenvolvido para o projeto Agrinho 2026
</footer>

<script src="script.js"></script>

</body>
</html>
